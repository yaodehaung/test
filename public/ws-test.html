<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebSocket Test</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #171717;
    }

    main {
      max-width: 760px;
      margin: 10vh auto;
      padding: 0 24px;
    }

    button {
      border: 0;
      border-radius: 6px;
      background: #171717;
      color: white;
      cursor: pointer;
      font: inherit;
      padding: 10px 14px;
    }

    pre {
      background: #111;
      border-radius: 6px;
      color: #e8e8e8;
      min-height: 180px;
      overflow: auto;
      padding: 16px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>WebSocket Handshake Test</h1>
    <p>Open a WebSocket connection to this server and log the browser events.</p>
    <p><button id="connect">Connect</button></p>
    <pre id="log"></pre>
  </main>
  <script src="/ws-test.js"></script>
</body>
</html>
